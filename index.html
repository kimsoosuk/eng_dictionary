<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>김수석 영어 사전</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --paper: #f8f3e8;
      --paper-edge: #e8dfc8;
      --paper-shadow: #d4c9ad;
      --ink: #2a2018;
      --ink-light: #6b5d4a;
      --ink-faint: #a0927c;
      --accent: #7a5c1e;
      --accent-warm: #b8922e;
      --accent-glow: rgba(184, 146, 46, .12);
      --cover: #2c2218;
      --cover-light: #4a3c2a;
      --spine: #1e180f;
      --gold: #c4a44a;
      --gold-dim: #8a7432;
      --font-serif: 'Gowun Batang', 'Batang', Georgia, serif;
      --font-sans: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      --book-h: min(calc(100dvh - 60px), 760px)
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased
    }

    body {
      background: #8a7e6e;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E"), radial-gradient(ellipse at 40% 30%, #9e9282 0%, #7a7060 60%, #605848 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      color: var(--ink);
      overflow-x: hidden;
      padding: 20px;
      -webkit-tap-highlight-color: transparent
    }

    #app {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100dvh - 40px)
    }

    /* Cover */
    .cover-scene {
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeUp .6s ease-out
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: scale(.96)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    .cover-shell {
      width: 100%;
      height: var(--book-h);
      background: var(--cover);
      border-radius: 4px 12px 12px 4px;
      padding: 6px;
      display: flex;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .3), 0 4px 12px rgba(0, 0, 0, .25), 0 16px 48px rgba(0, 0, 0, .35)
    }

    .cover-spine-el {
      width: 22px;
      min-width: 22px;
      background: linear-gradient(90deg, var(--spine), var(--cover-light) 40%, var(--cover) 70%, var(--cover-light));
      border-radius: 4px 0 0 4px;
      box-shadow: inset -2px 0 6px rgba(0, 0, 0, .4);
      position: relative
    }

    .cover-spine-el::after {
      content: '';
      position: absolute;
      top: 8%;
      bottom: 8%;
      left: 50%;
      width: 1px;
      background: var(--gold-dim);
      opacity: .4
    }

    .cover-face {
      flex: 1;
      background: linear-gradient(135deg, #3a2e20, var(--cover) 40%, #2a1f14);
      border-radius: 0 8px 8px 0;
      padding: 48px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden
    }

    .cover-face::before {
      content: '';
      position: absolute;
      inset: 12px;
      border: 1px solid var(--gold-dim);
      border-radius: 4px;
      opacity: .25;
      pointer-events: none
    }

    .cover-orn {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin-bottom: 28px;
      opacity: .6
    }

    .cover-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, .3));
      border-radius: 50%
    }

    .cover-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--paper);
      margin-bottom: 8px;
      line-height: 1.35
    }

    .cover-desc {
      font-family: var(--font-sans);
      font-size: .82rem;
      color: var(--ink-faint);
      line-height: 1.7;
      margin-bottom: 36px;
      max-width: 280px
    }

    .cover-desc strong {
      color: var(--gold);
      font-weight: 500
    }

    .cover-search {
      width: 100%;
      max-width: 300px;
      position: relative
    }

    .cover-input {
      width: 100%;
      padding: 14px 48px 14px 20px;
      border: 1px solid rgba(196, 164, 74, .3);
      border-radius: 24px;
      background: rgba(255, 255, 255, .06);
      color: var(--paper);
      font-family: var(--font-serif);
      font-size: .92rem;
      outline: none;
      transition: all .3s
    }

    .cover-input::placeholder {
      color: rgba(196, 164, 74, .4);
      font-style: italic
    }

    .cover-input:focus {
      border-color: var(--gold);
      background: rgba(255, 255, 255, .1);
      box-shadow: 0 0 20px rgba(196, 164, 74, .15)
    }

    .cover-sbtn {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .25s;
      box-shadow: 0 2px 8px rgba(122, 92, 30, .3)
    }

    .cover-sbtn:hover {
      background: var(--accent-warm)
    }

    .cover-sbtn:active {
      transform: translateY(-50%) scale(.92)
    }

    .cover-ft {
      margin-top: 32px;
      font-family: var(--font-sans);
      font-size: .6rem;
      color: rgba(196, 164, 74, .25)
    }

    .vocab-section {
      width: 100%;
      max-width: 300px;
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 0;
      max-height: 240px
    }

    .vocab-toggle {
      background: none;
      border: 1px solid rgba(196, 164, 74, .3);
      color: var(--gold-dim);
      font-family: var(--font-sans);
      font-size: .72rem;
      padding: 8px 18px;
      border-radius: 16px;
      cursor: pointer;
      transition: all .3s;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0
    }

    .vocab-toggle:hover {
      border-color: var(--gold);
      color: var(--gold)
    }

    .vocab-toggle svg {
      width: 14px;
      height: 14px
    }

    .vocab-list {
      margin-top: 12px;
      overflow-y: auto;
      scrollbar-width: none;
      flex: 1;
      min-height: 0;
      width: 100%
    }

    .vocab-list::-webkit-scrollbar {
      display: none
    }

    .vocab-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(196, 164, 74, .1);
      color: var(--paper-edge);
      font-family: var(--font-sans);
      font-size: .78rem;
      transition: all .2s
    }

    .vocab-item:hover {
      background: rgba(255, 255, 255, .04)
    }

    .vocab-item .word {
      font-weight: 600;
      color: var(--gold);
      cursor: pointer
    }

    .vocab-item .word:hover {
      text-decoration: underline
    }

    .vocab-item .meaning {
      color: var(--ink-faint);
      font-size: .7rem;
      flex: 1;
      margin-left: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .vocab-del {
      background: none;
      border: none;
      color: rgba(196, 164, 74, .3);
      cursor: pointer;
      padding: 4px;
      font-size: .7rem;
      transition: color .2s
    }

    .vocab-del:hover {
      color: #e74c3c
    }

    /* Book shell */
    .bk-scene {
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeUp .5s ease-out
    }

    .bk-shell {
      position: relative;
      display: flex;
      width: 100%;
      max-width: 1100px;
      height: var(--book-h);
      background: var(--cover);
      border-radius: 4px 10px 10px 4px;
      padding: 6px 6px 6px 0;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .3), 0 4px 12px rgba(0, 0, 0, .25), 0 16px 48px rgba(0, 0, 0, .35)
    }

    .bk-spine {
      width: 22px;
      min-width: 22px;
      background: linear-gradient(90deg, var(--spine), var(--cover-light) 40%, var(--cover) 70%, var(--cover-light));
      border-radius: 4px 0 0 4px;
      box-shadow: inset -2px 0 6px rgba(0, 0, 0, .4);
      position: relative
    }

    .bk-spine::after {
      content: '';
      position: absolute;
      top: 8%;
      bottom: 8%;
      left: 50%;
      width: 1px;
      background: var(--gold-dim);
      opacity: .4
    }

    .bk-pages {
      flex: 1;
      display: flex;
      background: var(--paper);
      border-radius: 0 6px 6px 0;
      overflow: hidden;
      position: relative;
      box-shadow: inset 2px 0 8px rgba(0, 0, 0, .06);
      min-height: 0
    }

    .bk-pages::before {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 8px;
      right: 4px;
      height: 3px;
      background: linear-gradient(90deg, var(--paper-edge), var(--paper-shadow), var(--paper-edge));
      border-radius: 0 0 2px 2px;
      z-index: -1
    }

    .bk-gutter {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 36px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, rgba(30, 24, 15, .04) 15%, rgba(30, 24, 15, .09) 35%, rgba(30, 24, 15, .16) 50%, rgba(30, 24, 15, .09) 65%, rgba(30, 24, 15, .04) 85%, transparent);
      z-index: 2;
      pointer-events: none
    }

    .bk-gutter::after {
      content: '';
      position: absolute;
      top: 2%;
      bottom: 2%;
      left: 50%;
      width: 1px;
      background: rgba(30, 24, 15, .1)
    }

    .bk-edge {
      position: absolute;
      top: 4px;
      bottom: 4px;
      right: -3px;
      width: 3px;
      background: repeating-linear-gradient(180deg, var(--paper) 0px, var(--paper) 1px, var(--paper-edge) 1px, var(--paper-edge) 2px);
      border-radius: 0 2px 2px 0;
      z-index: -1
    }

    /* Page header */
    .pg-hdr {
      font-family: var(--font-sans);
      font-size: .58rem;
      color: var(--ink-faint);
      letter-spacing: .12em;
      margin-bottom: 4px
    }

    .pg-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--ink-faint), transparent);
      opacity: .2;
      margin-bottom: 16px
    }

    #left-scroll::-webkit-scrollbar,
    #right-page::-webkit-scrollbar,
    #mob-scroll::-webkit-scrollbar {
      display: none
    }

    /* Chat bubbles */
    .cb {
      margin-bottom: 16px;
      animation: cfi .35s ease-out
    }

    @keyframes cfi {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .umsg {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 14px
    }

    .ub {
      background: var(--cover);
      color: var(--paper);
      padding: 10px 16px;
      border-radius: 14px 14px 4px 14px;
      max-width: 85%;
      font-family: var(--font-sans);
      font-size: .84rem;
      line-height: 1.6;
      word-break: keep-all
    }

    .amb {
      margin-bottom: 14px
    }

    .ab {
      background: #fff;
      border: 1px solid rgba(44, 36, 22, .06);
      padding: 14px 16px;
      border-radius: 14px 14px 14px 4px;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .04);
      font-family: var(--font-sans);
      font-size: .84rem;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: keep-all;
      color: var(--ink)
    }

    .sys-box {
      background: #fff;
      border: 1.5px dashed var(--paper-edge);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      animation: cfi .35s ease-out;
      position: relative
    }

    .sys-box.solid {
      border-style: solid;
      border-color: var(--accent-warm)
    }

    .sys-box p.sys-label {
      font-family: var(--font-sans);
      font-size: .78rem;
      font-weight: 600;
      color: var(--ink-light);
      margin: 0
    }

    .sys-box .phonetics {
      font-family: 'Courier New', monospace;
      font-size: .88rem;
      color: var(--accent);
      background: var(--accent-glow);
      padding: 4px 12px;
      border-radius: 8px
    }

    .record-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--cover);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .25s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .2);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent
    }

    .record-btn:hover {
      background: var(--accent)
    }

    .record-btn:active {
      transform: scale(.92)
    }

    .record-btn.recording {
      background: #c0392b;
      animation: recPulse 1.5s infinite
    }

    @keyframes recPulse {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(192, 57, 43, .4)
      }

      50% {
        opacity: .85;
        box-shadow: 0 0 0 10px rgba(192, 57, 43, 0)
      }
    }

    .record-label {
      font-family: var(--font-sans);
      font-size: .68rem;
      color: var(--ink-faint)
    }

    .tts-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border: none;
      border-radius: 20px;
      background: var(--accent-glow);
      color: var(--accent);
      font-family: var(--font-sans);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .25s
    }

    .tts-btn:hover {
      background: var(--accent);
      color: #fff
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      border: none;
      border-radius: 20px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-sans);
      font-size: .78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .25s;
      box-shadow: 0 2px 8px rgba(122, 92, 30, .25)
    }

    .action-btn:hover {
      background: var(--cover);
      transform: translateY(-1px)
    }

    .action-btn:active {
      transform: scale(.96)
    }

    .action-btn.secondary {
      background: var(--paper-edge);
      color: var(--ink-light);
      box-shadow: none
    }

    .action-btn.secondary:hover {
      background: var(--paper-shadow)
    }

    .skip-btn {
      position: absolute;
      bottom: 6px;
      right: 10px;
      background: none;
      border: none;
      font-family: var(--font-sans);
      font-size: .62rem;
      color: var(--ink-faint);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 3px;
      transition: color .2s
    }

    .skip-btn:hover {
      color: var(--accent)
    }

    .skip-btn svg {
      width: 10px;
      height: 10px
    }

    .sl {
      font-family: var(--font-sans);
      font-size: .65rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: .05em;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .sl-n {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: var(--accent-warm);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .6rem;
      font-weight: 700;
      flex-shrink: 0
    }

    .cc {
      background: #fff;
      border-radius: 8px;
      padding: 18px;
      border: 1px solid rgba(44, 36, 22, .06);
      box-shadow: 0 1px 3px rgba(0, 0, 0, .04), 0 4px 12px rgba(0, 0, 0, .03);
      font-family: var(--font-sans);
      font-size: .84rem;
      line-height: 1.8;
      color: var(--ink);
      word-break: keep-all
    }

    .dots {
      display: flex;
      gap: 4px;
      padding: 8px 0;
      justify-content: center
    }

    .dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--ink-faint);
      border-radius: 50%;
      animation: db 1.2s infinite
    }

    .dots span:nth-child(2) {
      animation-delay: .15s
    }

    .dots span:nth-child(3) {
      animation-delay: .3s
    }

    @keyframes db {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: .3
      }

      30% {
        transform: translateY(-5px);
        opacity: 1
      }
    }

    .bk-ft {
      margin-top: 10px;
      font-family: var(--font-sans);
      font-size: .6rem;
      color: rgba(255, 255, 255, .3);
      text-align: center
    }

    /* Input bar shared styles */
    .ib-input {
      flex: 1;
      border: 1px solid var(--paper-edge);
      border-radius: 20px;
      padding: 9px 16px;
      font-family: var(--font-sans);
      font-size: .83rem;
      outline: none;
      background: #fff;
      color: var(--ink)
    }

    .ib-input:focus {
      border-color: var(--accent-warm)
    }

    .ib-input::placeholder {
      color: var(--ink-faint)
    }

    .ib-input:disabled {
      background: var(--paper-edge);
      cursor: not-allowed
    }

    .ib-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      box-shadow: 0 2px 6px rgba(122, 92, 30, .25);
      flex-shrink: 0
    }

    .ib-btn:hover {
      background: var(--cover)
    }

    .ib-btn:disabled {
      opacity: .3;
      cursor: default
    }

    /* Home nav button */
    .home-nav {
      background: var(--paper-edge);
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-light);
      transition: all .2s;
      flex-shrink: 0
    }

    .home-nav:hover {
      background: var(--accent);
      color: #fff
    }

    .mob-ib {
      display: none
    }

    .dict-entry {
      font-family: var(--font-sans);
      font-size: .84rem;
      line-height: 1.9;
      color: var(--ink)
    }

    .dict-pos {
      font-weight: 700;
      color: var(--accent);
      display: block;
      margin-top: 6px
    }

    .dict-pos:first-child {
      margin-top: 0
    }

    /* Report */
    .report-overlay {
      position: absolute;
      inset: 0;
      background: var(--paper);
      z-index: 20;
      overflow-y: auto;
      padding: 24px;
      scrollbar-width: none
    }

    .report-overlay::-webkit-scrollbar {
      display: none
    }

    .report-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--accent-warm)
    }

    .report-header img {
      width: 48px;
      height: 48px;
      border-radius: 50%
    }

    .report-word {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent)
    }

    .report-phonetics {
      font-family: 'Courier New', monospace;
      font-size: .82rem;
      color: var(--ink-faint)
    }

    .report-section {
      margin-bottom: 18px;
      background: #fff;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--paper-edge)
    }

    .report-section h3 {
      font-family: var(--font-sans);
      font-size: .82rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .report-section p,
    .report-section li {
      font-family: var(--font-sans);
      font-size: .8rem;
      line-height: 1.7;
      color: var(--ink)
    }
