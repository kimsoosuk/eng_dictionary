<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>김수석 영어 사전</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * {
      font-family: 'Noto Sans KR', sans-serif;
    }

    .animate-bounce {
      animation: bounce 1s infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(-25%);
        animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
      }

      50% {
        transform: translateY(0);
        animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
      }
    }

    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 2px;
    }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      z-index: 1000;
      animation: fadeInUp 0.3s ease;
      max-width: 90%;
      text-align: center;
      line-height: 1.5;
      white-space: pre-line;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
  </style>
</head>

<body class="bg-gray-50">
  <div id="app" class="w-full h-screen flex justify-center overflow-hidden text-gray-800">
    <div id="main-container" class="w-full max-w-md bg-white h-full flex flex-col relative shadow-xl overflow-hidden">
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script>
    // =====================
    // 설정 및 상수
    // =====================
    const CONFIG = {
      WORKER_URL: 'https://dictionary.kimsoosuk1.workers.dev',
      KIM_IMAGE_URL: 'https://res.cloudinary.com/dms5vyofw/image/upload/v1767169336/%E1%84%80%E1%85%B5%E1%86%B7%E1%84%89%E1%85%AE%E1%84%89%E1%85%A5%E1%86%A8%E1%84%8B%E1%85%A1%E1%84%8B%E1%85%B5%E1%84%8F%E1%85%A9%E1%86%AB_%E1%84%85%E1%85%A1%E1%84%8B%E1%85%B5%E1%86%AB_%E1%84%8F%E1%85%A5%E1%86%AF%E1%84%85%E1%85%A53_sh39nc.png',
      SYSTEM_PERSONA: `
너의 이름은 '김수석'이다. 학생들의 영어 학습을 돕는 아주 친절하고 다정한 영어 선생님이다.
학생이 틀리거나 부족해도 절대 나무라지 않고, 따뜻하게 격려하며 스스로 답을 찾을 수 있게 이끌어준다.
[중요]: 절대 학생의 이름(예: 수빈아, 00아 등)을 임의로 지어내어 부르지 마라. 호칭 자체를 생략하라.
인사말이나 자기소개는 생략하고 곧바로 본론을 말한다. 이모지(😊 등)나 마크다운 특수기호(*, **, # 등)는 절대 사용하지 말고 자연스러운 평문으로 대답한다.
말투는 친한 형/오빠, 언니/누나처럼 아주 친근하고 부드러운 반말('~어', '~야', '~지', '~해볼까?' 등)을 사용한다.
      `.trim(),
      ITEMS_PER_PAGE: 10,
      API_TIMEOUT_MS: 38000,
      MAX_RETRIES: 2,
      WORD_PATTERN: /^[a-zA-Z\s'\-]{1,50}$/,
      MAX_VOCAB_SIZE: 500 // localStorage 용량 초과 방지
    };

    // =====================
    // 앱 상태
    // =====================
    const state = {
      view: 'home',
      vocabList: [],
      currentWord: '',
      currentPage: 1,
      messages: [],
      isTyping: false,
      inputText: '',
      inputEnabled: false,
      chatStep: 'INIT',
      retryCount: 0,
      recordRetryCount: 0,
      showHeader: true,
      lastScrollY: 0,
      context: { engDef: '', phonetics: '', tempEx: '', finalData: null },
      evaluation: { pronunciationFeedback: '', exampleSentences: [], writing: { text: '', userWriting: '', feedback: '' } },
      mediaRecorder: null,
      audioChunks: [],
      isRecording: false,
      currentStream: null,
      blobUrls: [],
      ttsVoicesLoaded: false
    };

    // localStorage에서 단어장 안전하게 로드
    (function loadVocabList() {
      try {
        const saved = localStorage.getItem('vocabList');
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed)) {
            state.vocabList = parsed.slice(0, CONFIG.MAX_VOCAB_SIZE);
          }
        }
      } catch (e) {
        console.warn('단어장 로드 실패:', e);
        state.vocabList = [];
      }
    })();

    // =====================
    // 유틸리티 함수
    // =====================
    function saveVocabList() {
      try {
        // 용량 초과 방지
        if (state.vocabList.length > CONFIG.MAX_VOCAB_SIZE) {
          state.vocabList = state.vocabList.slice(0, CONFIG.MAX_VOCAB_SIZE);
        }
        localStorage.setItem('vocabList', JSON.stringify(state.vocabList));
      } catch (e) {
        console.warn('localStorage 저장 실패:', e);
        if (e.name === 'QuotaExceededError') {
          // 오래된 단어 삭제 후 재시도
          state.vocabList = state.vocabList.slice(0, Math.floor(state.vocabList.length / 2));
          try {
            localStorage.setItem('vocabList', JSON.stringify(state.vocabList));
            showToast('저장 공간 부족으로 오래된 단어 일부가 삭제되었습니다.');
          } catch (e2) {
            showToast('단어장 저장에 실패했습니다.');
          }
        } else {
          showToast('단어장 저장에 실패했습니다.');
        }
      }
    }

    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('파일 읽기 실패'));
        reader.readAsDataURL(blob);
      });
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 9); }

    function createBlobUrl(blob) {
      const url = URL.createObjectURL(blob);
      state.blobUrls.push(url);
      return url;
    }

    function revokeAllBlobUrls() {
      state.blobUrls.forEach(url => { try { URL.revokeObjectURL(url); } catch (e) { } });
      state.blobUrls = [];
    }

    function showToast(message, duration = 3000) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => { if (toast.parentNode) toast.remove(); }, duration);
    }

    function checkBrowserSupport() {
      return {
        mediaRecorder: typeof MediaRecorder !== 'undefined',
        getUserMedia: !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia),
        speechSynthesis: 'speechSynthesis' in window,
        localStorage: (() => { try { localStorage.setItem('t', 't'); localStorage.removeItem('t'); return true; } catch (e) { return false; } })(),
        secureContext: window.isSecureContext
      };
    }

    function getRecordingMimeType() {
      if (typeof MediaRecorder === 'undefined') return '';
      const types = ['audio/mp4', 'audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/wav'];
      for (const type of types) {
        try { if (MediaRecorder.isTypeSupported(type)) return type; } catch (e) { }
      }
      return '';
    }

    // =====================
    // Gemini API 호출
    // =====================
    async function callGemini(prompt, isJson = false, audioBase64 = null, retryAttempt = 0) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), CONFIG.API_TIMEOUT_MS);

      try {
        const response = await fetch(`${CONFIG.WORKER_URL}/api/gemini`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, isJson, audioBase64, systemPrompt: CONFIG.SYSTEM_PERSONA }),
          signal: controller.signal
        });
        clearTimeout(timeoutId);

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error || `API 오류: ${response.status}`);
        }

        const result = await response.json();
        if (!result.success) throw new Error(result.error || 'API 호출 실패');

        if (isJson && result.parseError) {
          try {
            const jsonMatch = result.text.match(/\{[\s\S]*\}/);
            if (jsonMatch) return JSON.parse(jsonMatch[0]);
          } catch (e) { }
          throw new Error('응답 형식 오류');
        }
        return isJson ? result.data : result.text;
      } catch (error) {
        clearTimeout(timeoutId);
        if (error.name === 'AbortError') {
          if (retryAttempt < CONFIG.MAX_RETRIES && !audioBase64) {
            showToast('응답이 느려요. 다시 시도 중...');
            return callGemini(prompt, isJson, null, retryAttempt + 1);
          }
          throw new Error('요청 시간이 초과되었습니다.');
        }
        if ((error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) && retryAttempt < CONFIG.MAX_RETRIES && !audioBase64) {
          await new Promise(r => setTimeout(r, 1000));
          return callGemini(prompt, isJson, null, retryAttempt + 1);
        }
        throw error;
      }
    }

    // =====================
    // TTS
    // =====================
    function loadTTSVoices() {
      return new Promise((resolve) => {
        if (!window.speechSynthesis) { resolve([]); return; }
        const voices = window.speechSynthesis.getVoices();
        if (voices.length > 0) { state.ttsVoicesLoaded = true; resolve(voices); return; }
        window.speechSynthesis.onvoiceschanged = () => { state.ttsVoicesLoaded = true; resolve(window.speechSynthesis.getVoices()); };
        setTimeout(() => { state.ttsVoicesLoaded = true; resolve(window.speechSynthesis.getVoices()); }, 1000);
      });
    }

    async function playTTS(word) {
      if (!window.speechSynthesis) { showToast('발음 재생 미지원'); return; }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = 'en-US';
      utterance.rate = 0.9;
      const voices = await loadTTSVoices();
      const enVoices = voices.filter(v => v.lang.startsWith('en-US') || v.lang.startsWith('en_US'));
      const premiumVoice = enVoices.find(v => v.name.includes('Google') || v.name.includes('Samantha') || v.name.includes('Daniel'));
      if (premiumVoice) utterance.voice = premiumVoice;
      else if (enVoices.length > 0) utterance.voice = enVoices[0];
      window.speechSynthesis.speak(utterance);
    }

    // =====================
    // 렌더링
    // =====================
    function render() {
      const container = document.getElementById('main-container');
      if (state.view === 'home' || state.view === 'report') revokeAllBlobUrls();
      if (state.view === 'home') renderHomeView(container);
      else if (state.view === 'chat') renderChatView(container);
      else if (state.view === 'report') renderReportView(container);
      lucide.createIcons();
    }

    function renderHomeView(container) {
      const totalPages = Math.ceil(state.vocabList.length / CONFIG.ITEMS_PER_PAGE);
      const displayedVocab = state.vocabList.slice((state.currentPage - 1) * CONFIG.ITEMS_PER_PAGE, state.currentPage * CONFIG.ITEMS_PER_PAGE);

      container.innerHTML = `
        <div class="flex-1 overflow-y-auto p-4 sm:p-6 flex flex-col items-center">
          <img src="${CONFIG.KIM_IMAGE_URL}" alt="김수석" class="w-24 h-24 rounded-full shadow-md mb-4 object-cover border-4 border-gray-100" />
          <h1 class="text-2xl font-bold mb-1 text-center">김수석 영어 사전</h1>
          <p class="text-gray-500 mb-6 text-center text-sm break-keep">단어가 저절로 외워지는 영어 사전</p>
          <form id="search-form" class="w-full relative mb-8">
            <input type="text" id="search-input" placeholder="단어를 검색해봐..." autocomplete="off" autocapitalize="none" class="w-full pl-5 pr-12 py-4 rounded-2xl bg-gray-100 focus:bg-white border-2 border-transparent focus:border-blue-500 outline-none transition-all shadow-inner" />
            <button type="submit" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-600"><i data-lucide="search" class="w-6 h-6"></i></button>
          </form>
          <div class="w-full flex-1">
            <h2 class="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="bookmark" class="w-5 h-5 text-gray-700"></i> 나의 단어장</h2>
            ${state.vocabList.length === 0 ? `<div class="text-center text-gray-400 py-10 bg-gray-50 rounded-xl border border-dashed border-gray-200">아직 저장한 단어가 없네.<br/>새롭게 배운 단어는 꼭 기록해두자!</div>` : `
              <div class="w-full flex flex-col pb-6">
                <ul class="space-y-3">${displayedVocab.map(item => `
                  <li class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm flex flex-col gap-2">
                    <div class="flex items-baseline gap-2 flex-wrap"><span class="font-bold text-xl text-gray-900">${escapeHtml(item.word)}</span><span class="text-gray-500 text-sm">[${escapeHtml(item.pos || '')}] [${escapeHtml(item.phonetics || '')}]</span></div>
                    <div class="flex flex-col gap-1 mt-1">${(item.meanings || []).map(m => `<span class="text-blue-700 font-medium text-[15px]">• ${escapeHtml(m)}</span>`).join('')}</div>
                    ${item.example ? `<div class="text-gray-600 text-sm mt-2 bg-gray-50 p-3 rounded-lg italic">"${escapeHtml(item.example)}"</div>` : ''}
                  </li>`).join('')}</ul>
                ${totalPages > 1 ? `<div class="flex justify-center items-center gap-4 mt-6"><button type="button" id="prev-page" ${state.currentPage === 1 ? 'disabled' : ''} class="px-4 py-2 text-sm bg-gray-100 text-gray-700 rounded-lg disabled:opacity-30">이전</button><span class="text-sm font-medium text-gray-600">${state.currentPage} / ${totalPages}</span><button type="button" id="next-page" ${state.currentPage === totalPages ? 'disabled' : ''} class="px-4 py-2 text-sm bg-gray-100 text-gray-700 rounded-lg disabled:opacity-30">다음</button></div>` : ''}
              </div>`}
          </div>
        </div>`;

      document.getElementById('search-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const raw = document.getElementById('search-input').value.trim().toLowerCase();
        if (!raw) return;
        if (!CONFIG.WORD_PATTERN.test(raw)) { showToast('영어 단어만 입력할 수 있어요.'); return; }
        state.currentWord = raw.slice(0, 50);
        state.view = 'chat';
        state.messages = [];
        state.chatStep = 'INIT';
        state.inputEnabled = false;
        state.isTyping = false;
        state.retryCount = 0;
        state.recordRetryCount = 0;
        state.context = { engDef: '', phonetics: '', tempEx: '', finalData: null };
        state.evaluation = { pronunciationFeedback: '', exampleSentences: [], writing: { text: '', userWriting: '', feedback: '' } };
        render();
        startLesson();
      });

      const prevBtn = document.getElementById('prev-page');
      const nextBtn = document.getElementById('next-page');
      if (prevBtn) prevBtn.addEventListener('click', () => { state.currentPage = Math.max(1, state.currentPage - 1); render(); });
      if (nextBtn) nextBtn.addEventListener('click', () => { state.currentPage = Math.min(Math.ceil(state.vocabList.length / CONFIG.ITEMS_PER_PAGE), state.currentPage + 1); render(); });
    }

    function renderChatView(container) {
      container.innerHTML = `
        <div class="relative flex-1 flex flex-col h-full bg-gray-50/50 overflow-hidden">
          <div id="chat-header" class="absolute top-0 left-0 w-full bg-white/95 backdrop-blur-sm z-20 border-b border-gray-100 shadow-sm transition-transform duration-300 flex items-center justify-between p-3 ${state.showHeader ? 'translate-y-0' : '-translate-y-full'}">
            <button type="button" id="go-home-btn" class="p-2 -ml-1 text-gray-600 hover:text-gray-900 transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
            <div class="font-bold text-lg tracking-tight text-gray-800">김수석 영어 사전</div>
            <div class="w-8"></div>
          </div>
          <div id="messages-area" class="flex-1 overflow-y-auto p-2 sm:p-4 space-y-4 pt-16 sm:pt-20">${renderMessages()}${state.isTyping ? renderTypingIndicator() : ''}<div id="messages-end"></div></div>
          <div class="flex-shrink-0 p-2 sm:p-4 bg-white border-t border-gray-200">
            <form id="chat-form" class="relative flex items-center">
              <input type="text" id="chat-input" value="${escapeHtml(state.inputText)}" ${!state.inputEnabled ? 'disabled' : ''} placeholder="${state.inputEnabled ? '답변을 입력하세요...' : '대화 진행 중...'}" autocomplete="off" class="w-full pl-3 pr-10 py-2 sm:py-3 rounded-xl border ${state.inputEnabled ? 'bg-gray-50 border-gray-300 focus:border-blue-500' : 'bg-gray-100 border-gray-200 cursor-not-allowed'} outline-none transition-colors text-[15px]" />
              <button type="submit" ${!state.inputEnabled ? 'disabled' : ''} class="absolute right-1 p-2 rounded-lg ${state.inputEnabled ? 'text-blue-600 hover:bg-blue-50' : 'text-gray-400'} transition-colors"><i data-lucide="send" class="w-4 h-4"></i></button>
            </form>
          </div>
        </div>`;
      document.getElementById('go-home-btn').addEventListener('click', goHome);
      const messagesArea = document.getElementById('messages-area');
      messagesArea.addEventListener('scroll', (e) => {
        const currentScrollY = e.target.scrollTop;
        if (currentScrollY > state.lastScrollY && currentScrollY > 50) { state.showHeader = false; document.getElementById('chat-header')?.classList.add('-translate-y-full'); }
        else if (currentScrollY < state.lastScrollY) { state.showHeader = true; document.getElementById('chat-header')?.classList.remove('-translate-y-full'); }
        state.lastScrollY = currentScrollY;
      });
      scrollToBottom();
    }

    // 전역 이벤트 위임
    document.addEventListener('submit', (e) => {
      if (e.target && e.target.id === 'chat-form') {
        e.preventDefault();
        const inputEl = document.getElementById('chat-input');
        if (inputEl) state.inputText = inputEl.value;
        handleUserTextSubmit();
      }
    });
    document.addEventListener('input', (e) => { if (e.target && e.target.id === 'chat-input') state.inputText = e.target.value; });

    function renderMessages() {
      return state.messages.map(msg => {
        if (msg.role === 'ai') return renderAiBubble(msg.content);
        if (msg.role === 'user' && msg.type !== 'audio') return renderUserBubble(msg.content);
        if (msg.role === 'user' && msg.type === 'audio') return renderUserAudioBubble(msg.base64 || msg.blobUrl);
        if (msg.role === 'system') return renderSystemBox(msg.type, msg.id);
        return '';
      }).join('');
    }

    function renderAiBubble(content) {
      return `<div class="flex items-start gap-2 sm:gap-3 w-full max-w-[95%] sm:max-w-[90%]"><img src="${CONFIG.KIM_IMAGE_URL}" alt="김수석" class="w-8 h-8 sm:w-10 sm:h-10 rounded-full border border-gray-200 shadow-sm object-cover shrink-0 mt-1" /><div class="bg-white p-3 sm:p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 text-gray-800 leading-relaxed whitespace-pre-wrap text-[14px] sm:text-[15px]">${escapeHtml(content)}</div></div>`;
    }
    function renderUserBubble(content) {
      return `<div class="flex justify-end w-full"><div class="bg-gray-800 text-white p-3 sm:p-4 rounded-2xl rounded-tr-none shadow-sm max-w-[90%] sm:max-w-[85%] text-[14px] sm:text-[15px] leading-relaxed break-words">${escapeHtml(content)}</div></div>`;
    }
    function renderUserAudioBubble(srcUrl) {
      if (!srcUrl) return '<div class="flex justify-end w-full"><div class="bg-gray-800 text-white p-3 rounded-2xl rounded-tr-none text-sm">녹음 파일</div></div>';
      return `<div class="flex justify-end w-full"><div class="bg-gray-800 p-2 sm:p-3 rounded-2xl rounded-tr-none shadow-sm max-w-[85%] flex items-center shrink-0"><audio src="${srcUrl}" controls class="h-8 sm:h-10 w-40 sm:w-48"></audio></div></div>`;
    }
    function renderTypingIndicator() {
      return `<div class="flex items-start gap-3 w-full mt-4"><img src="${CONFIG.KIM_IMAGE_URL}" alt="김수석" class="w-10 h-10 rounded-full border border-gray-200" /><div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 flex items-center gap-1"><div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div><div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div><div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div></div></div>`;
    }

    function renderSystemBox(type, id) {
      if (type === 'recording_box_1' || type === 'recording_box_2') {
        return `<div id="system-${id}" class="my-2 p-4 bg-white border-2 border-dashed border-gray-300 rounded-xl flex flex-col items-center gap-2 shadow-sm relative"><p class="text-sm font-bold text-gray-700 mb-1">직접 소리내어 읽어볼까?</p><button type="button" data-action="record" data-type="${type}" data-id="${id}" class="record-btn p-3 rounded-full flex items-center justify-center transition-all shadow-md bg-gray-800 text-white hover:bg-gray-700 active:scale-95"><i data-lucide="mic" class="w-6 h-6"></i></button><p class="record-label text-xs text-gray-500">버튼을 눌러 녹음 시작</p><button type="button" data-action="skip" data-skip-type="${type === 'recording_box_1' ? 'RECORDING_1' : 'RECORDING_2'}" class="absolute bottom-2 right-3 text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1">skip <i data-lucide="skip-forward" class="w-3 h-3"></i></button></div>`;
      }
      if (type === 'tts_box') {
        return `<div id="system-${id}" class="my-2 p-4 bg-white border border-gray-200 rounded-xl flex flex-col items-center gap-3 shadow-sm relative"><p class="text-sm font-bold text-gray-700">원어민 발음도 들어보자.</p>${state.context.phonetics ? `<p class="text-[15px] font-mono text-blue-600 bg-blue-50 px-2 py-1 rounded-md">[${escapeHtml(state.context.phonetics)}]</p>` : ''}<button type="button" data-action="tts-play" class="p-2 sm:p-3 bg-blue-100 text-blue-700 rounded-full hover:bg-blue-200 transition-colors shadow-sm flex items-center gap-2 px-4 font-semibold text-sm"><i data-lucide="volume-2" class="w-4 h-4"></i> 발음 듣기</button><button type="button" data-action="tts-next" class="absolute bottom-2 right-3 text-xs text-gray-500 font-medium hover:text-gray-800 flex items-center gap-1">다음으로 <i data-lucide="arrow-right" class="w-3 h-3"></i></button></div>`;
      }
      if (type === 'ex1_box') return `<div id="system-${id}" class="my-2 p-4 bg-white border border-gray-200 rounded-xl flex flex-col items-center gap-2 shadow-sm relative"><button type="button" data-action="ex1" class="w-full py-2 bg-blue-600 text-white rounded-lg font-bold shadow-sm hover:bg-blue-700 transition-colors mb-4 text-sm">예문 1 보기</button><button type="button" data-action="skip" data-skip-type="EX1_BTN" class="absolute bottom-2 right-3 text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1">skip <i data-lucide="skip-forward" class="w-3 h-3"></i></button></div>`;
      if (type === 'ex2_box') return `<div id="system-${id}" class="my-2 p-4 bg-white border border-gray-200 rounded-xl flex flex-col items-center gap-2 shadow-sm relative"><button type="button" data-action="ex2" class="w-full py-2 bg-blue-600 text-white rounded-lg font-bold shadow-sm hover:bg-blue-700 transition-colors mb-4 text-sm">예문 2 보기</button><button type="button" data-action="skip" data-skip-type="EX2_BTN" class="absolute bottom-2 right-3 text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1">skip <i data-lucide="skip-forward" class="w-3 h-3"></i></button></div>`;
      if (type === 'save_box') return `<div id="system-${id}" class="my-2 p-4 bg-white border-2 border-gray-800 rounded-xl flex flex-col items-center gap-2 shadow-md relative"><button type="button" data-action="view-report" class="w-full py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-colors flex items-center justify-center gap-2 mb-2 text-sm shadow-sm"><i data-lucide="file-text" class="w-4 h-4"></i> 나의 학습 리포트 보기</button><button type="button" data-action="save" class="w-full py-2 bg-gray-100 text-gray-700 border border-gray-200 rounded-lg font-bold hover:bg-gray-200 transition-colors flex items-center justify-center gap-2 mb-4 text-sm"><i data-lucide="bookmark-plus" class="w-4 h-4"></i> 바로 단어 저장</button><button type="button" data-action="skip" data-skip-type="SAVE" class="absolute bottom-2 right-3 text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1">종료 <i data-lucide="skip-forward" class="w-3 h-3"></i></button></div>`;
      if (type === 'retry_box') return `<div id="system-${id}" class="my-2 p-3 bg-white border border-gray-200 rounded-xl flex justify-center gap-3 shadow-sm"><button type="button" data-action="retry-lesson" class="px-5 py-2 bg-gray-800 text-white rounded-lg font-bold text-sm hover:bg-gray-700 transition-colors flex items-center gap-2"><i data-lucide="refresh-cw" class="w-4 h-4"></i> 다시 시도</button><button type="button" data-action="go-home-btn2" class="px-5 py-2 bg-gray-100 text-gray-600 rounded-lg font-bold text-sm hover:bg-gray-200 transition-colors">홈으로</button></div>`;
      return '';
    }

    function setupSystemBoxListeners() {
      document.querySelectorAll('[data-action="skip"]').forEach(btn => { btn.onclick = (e) => { e.preventDefault(); handleSkip(btn.dataset.skipType); }; });

      // ⭐ 핵심: 녹음 버튼 - onclick으로 직접 바인딩 (addEventListener 대신)
      document.querySelectorAll('[data-action="record"]').forEach(btn => {
        btn.onclick = function (e) {
          // input=file에서 발생한 클릭(버블링)이면 무시하고 기본 탐색기가 열리도록 냅둠
          if (e.target.tagName && e.target.tagName.toLowerCase() === 'input') return;
          
          e.preventDefault();
          if (state.isRecording) stopRecording(this.dataset.type);
          else startRecording(this, this.dataset.type, this.dataset.id);
        };
      });

      document.querySelectorAll('[data-action="tts-play"]').forEach(btn => { btn.onclick = (e) => { e.preventDefault(); playTTS(state.currentWord); }; });
      document.querySelectorAll('[data-action="tts-next"]').forEach(btn => { btn.onclick = (e) => { e.preventDefault(); transitionToRecord2(); }; });
      document.querySelectorAll('[data-action="ex1"]').forEach(btn => { btn.onclick = (e) => { e.preventDefault(); triggerEx1(); }; });
      document.querySelectorAll('[data-action="ex2"]').forEach(btn => { btn.onclick = (e) => { e.preventDefault(); triggerEx2(); }; });
      document.querySelectorAll('[data-action="save"]').forEach(btn => { btn.onclick = (e) => { e.preventDefault(); saveWord(); }; });
      document.querySelectorAll('[data-action="view-report"]').forEach(btn => { btn.onclick = (e) => { e.preventDefault(); state.view = 'report'; render(); }; });
      document.querySelectorAll('[data-action="retry-lesson"]').forEach(btn => { btn.onclick = (e) => { e.preventDefault(); state.messages = []; state.chatStep = 'INIT'; state.isTyping = false; state.retryCount = 0; state.recordRetryCount = 0; state.context = { engDef: '', phonetics: '', tempEx: '', finalData: null }; state.evaluation = { pronunciationFeedback: '', exampleSentences: [], writing: { text: '', userWriting: '', feedback: '' } }; render(); startLesson(); }; });
      document.querySelectorAll('[data-action="go-home-btn2"]').forEach(btn => { btn.onclick = (e) => { e.preventDefault(); goHome(); }; });
    }

    function scrollToBottom() { setTimeout(() => { document.getElementById('messages-end')?.scrollIntoView({ behavior: 'smooth' }); }, 100); }
    function addMessage(msg) { state.messages.push({ id: generateId(), ...msg }); renderChatMessages(); }
    function renderChatMessages() {
      const messagesArea = document.getElementById('messages-area');
      if (messagesArea) {
        messagesArea.innerHTML = `${renderMessages()}${state.isTyping ? renderTypingIndicator() : ''}<div id="messages-end"></div>`;
        lucide.createIcons();
        setupSystemBoxListeners();
        scrollToBottom();
      }
    }
    function setTyping(val) { state.isTyping = val; renderChatMessages(); }

    function goHome() {
      if (state.isRecording && state.mediaRecorder) { try { state.mediaRecorder.stop(); } catch (e) { } state.isRecording = false; }
      if (state.currentStream) { state.currentStream.getTracks().forEach(track => track.stop()); state.currentStream = null; }
      state.view = 'home'; state.currentWord = ''; state.currentPage = 1; render();
    }

    async function startLesson() {
      setTyping(true);
      try {
        const prompt = `영어 단어 "${state.currentWord}"에 대해 다음을 JSON 형태로 제공해줘. {"intro": "가벼운 1문장 (뜻/예문 언급 금지)", "phonetics": "IPA 발음기호", "eng_def": "영영사전 뜻"}`;
        const data = await callGemini(prompt, true);
        state.context.engDef = data.eng_def;
        state.context.phonetics = data.phonetics;
        addMessage({ role: 'ai', content: `${data.intro} 먼저 발음 기호를 알려줄게.` });
        setTimeout(() => { addMessage({ role: 'ai', content: `[ ${data.phonetics} ]` }); addMessage({ role: 'system', type: 'recording_box_1' }); state.chatStep = 'WAIT_RECORD_1'; setTyping(false); }, 1000);
      } catch (e) {
        addMessage({ role: 'ai', content: '네트워크가 원활하지 않네. 잠시 후 다시 시도해볼까?' });
        addMessage({ role: 'system', type: 'retry_box' });
        setTyping(false);
      }
    }

    function handleSkip(fromStep) {
      switch (fromStep) {
        case 'RECORDING_1': state.chatStep = 'WAIT_TTS'; addMessage({ role: 'system', type: 'tts_box' }); break;
        case 'RECORDING_2': transitionToMeaning(); break;
        case 'EX1_BTN': transitionToEx2Btn(); break;
        case 'EX2_BTN': transitionToWriting(); break;
        case 'SAVE': goHome(); break;
      }
    }

    // =====================
    // ⭐ 녹음 기능 (모바일 호환성 핵심 수정)
    // =====================
    /**
     * 동기 함수로 녹음 시작 - iOS Safari 사용자 제스처 컨텍스트 유지 및 폴백 제공
     * async/await 대신 Promise.then() 체이닝 사용
     */
    function startRecording(btn, type, id) {
      // 1. 보안 컨텍스트 확인 (HTTPS 필수)
      if (!window.isSecureContext) {
        showToast('HTTPS 환경에서만 브라우저 마이크 접근이 가능합니다.', 4000);
        showFallbackInput(btn, type, '대안으로 파일 첨부/기본 녹음기를 띄웁니다.');
        return;
      }

      // 모바일 인앱 브라우저 감지 (카카오톡, 네이버, 인스타그램 등)
      const userAgent = navigator.userAgent.toLowerCase();
      const inAppBrowser = /kakaotalk|instagram|fban|fbav|line|naver|daum/i.test(userAgent);
      
      if (inAppBrowser) {
        // 인앱 브라우저는 getUserMedia가 막힌 경우가 많으므로 바로 폴백 실행
        showFallbackInput(btn, type, '인앱 브라우저 보안 정책에 따라 파일 업로드(녹음기)로 자동 전환합니다.');
        return;
      }

      // 2. API 지원 확인
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder === 'undefined') {
        showFallbackInput(btn, type, '브라우저 녹음이 지원되지 않아 파일 업로드 폴백으로 전환합니다.');
        return;
      }

      // 3. UI 즉시 업데이트 (사용자 피드백)
      btn.classList.add('opacity-50');
      btn.disabled = true;
      const label = btn.parentElement.querySelector('.record-label');
      if (label) label.textContent = '마이크 연결 중...';

      // 4. getUserMedia - ⭐ Promise.then() 체이닝 (async/await 사용 안 함!)
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function (stream) {
          // 이전 스트림 정리
          if (state.currentStream && state.currentStream !== stream) {
            state.currentStream.getTracks().forEach(track => track.stop());
          }
          state.currentStream = stream;

          // MIME 타입 선택
          const mimeType = getRecordingMimeType();
          let recorder;
          try {
            recorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
          } catch (e) {
            recorder = new MediaRecorder(stream);
          }
          state.mediaRecorder = recorder;
          state.audioChunks = [];

          recorder.ondataavailable = function (e) {
            if (e.data && e.data.size > 0) state.audioChunks.push(e.data);
          };

          recorder.onstop = function () {
            const actualMimeType = recorder.mimeType || mimeType || 'audio/webm';
            const audioBlob = new Blob(state.audioChunks, { type: actualMimeType });
            if (state.currentStream) { state.currentStream.getTracks().forEach(track => track.stop()); state.currentStream = null; }
            handleRecordingComplete(audioBlob, type);
          };

          recorder.onerror = function (e) {
            console.error('MediaRecorder 에러:', e);
            showFallbackInput(btn, type, '녹음 중 오류가 발생하여 오프라인 모드로 전환합니다.');
            state.isRecording = false;
          };

          // 녹음 시작
          recorder.start();
          state.isRecording = true;

          // UI 업데이트 - 녹음 중
          btn.classList.remove('opacity-50', 'bg-gray-800', 'hover:bg-gray-700');
          btn.classList.add('bg-red-500', 'animate-pulse');
          btn.disabled = false;
          btn.innerHTML = '<i data-lucide="mic-off" class="w-6 h-6"></i>';
          if (label) label.textContent = '녹음 중... 다시 눌러 완료';
          lucide.createIcons();
        })
        .catch(function (err) {
          console.error('마이크 접근 실패:', err);
          let message = '마이크 접근에 실패했습니다.';
          if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
            message = '마이크 권한이 차단되었습니다. 대신 기본 녹음앱 호출 버튼을 엽니다.';
          } else if (err.name === 'NotFoundError') {
            message = '마이크 모듈을 찾을 수 없어 파일 첨부 기능으로 전환합니다.';
          } else {
            message = `권한 문제(${err.name})로 파일 첨부 폴백 기능으로 전환합니다.`;
          }
          showFallbackInput(btn, type, message);
        });
    }

    function showFallbackInput(btn, type, alertMessage) {
      resetRecordButton(btn);
      if (alertMessage) showToast(alertMessage, 4500);
      
      btn.classList.add('relative', 'overflow-hidden', 'bg-blue-600', 'hover:bg-blue-700', 'active:scale-95');
      btn.classList.remove('bg-gray-800', 'hover:bg-gray-700', 'opacity-50', 'bg-red-500', 'animate-pulse');
      btn.innerHTML = '<i data-lucide="folder-open" class="w-6 h-6 text-white"></i>';
      
      const label = btn.parentElement.querySelector('.record-label');
      if (label) {
        label.innerHTML = '<span class="text-blue-600 font-bold text-[13px]">오프라인 녹음기로 전환됨</span><br/>터치해서 파일/녹음 추가';
      }

      const existingInput = btn.querySelector('input[type="file"]');
      if (existingInput) existingInput.remove();

      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'audio/*';
      fileInput.className = 'absolute inset-0 w-full h-full opacity-0 cursor-pointer';
      
      fileInput.onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
          showToast('오디오 파일을 분석 중입니다...', 2000);
          resetRecordButton(btn); // 로딩 UI를 위해 초기 상태로 복귀
          btn.classList.add('opacity-50');
          btn.innerHTML = '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>';
          handleRecordingComplete(file, type);
        }
      };
      
      btn.appendChild(fileInput);
      lucide.createIcons();
    }

    function resetRecordButton(btn) {
      btn.classList.remove('opacity-50', 'bg-red-500', 'animate-pulse', 'relative', 'overflow-hidden', 'bg-blue-600', 'hover:bg-blue-700');
      btn.classList.add('bg-gray-800', 'hover:bg-gray-700', 'active:scale-95');
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="mic" class="w-6 h-6"></i>';
      const label = btn.parentElement?.querySelector('.record-label');
      if (label) label.textContent = '버튼을 눌러 녹음 시작';
      
      const existingInput = btn.querySelector('input[type="file"]');
      if (existingInput) existingInput.remove();
      
      lucide.createIcons();
    }

    function stopRecording(type) {
      if (state.mediaRecorder && state.isRecording) {
        try { state.mediaRecorder.stop(); } catch (e) { }
        state.isRecording = false;
      }
    }

    async function handleRecordingComplete(audioBlob, boxType) {
      // 파일 업로드 폴백 시 type이 빈 문자열일 수 있으므로 기본값 강제 할당 (MIME 매칭 오류 방지)
      if (!audioBlob.type) {
        audioBlob = new Blob([audioBlob], { type: 'audio/mp4' }); 
      }
      
      const blobUrl = createBlobUrl(audioBlob);
      const msgId = generateId();
      state.messages.push({ id: msgId, role: 'user', type: 'audio', blobUrl });
      renderChatMessages();
      state.chatStep = 'PROCESSING';
      setTyping(true);

      try {
        let base64Audio = await blobToBase64(audioBlob);
        const mimeMatch = base64Audio.match(/^data:([^;]+)(?:;[^,]*)?,/);
        if (mimeMatch && mimeMatch[1]) {
          const cleanMime = mimeMatch[1];
          const b64Data = base64Audio.substring(base64Audio.indexOf(',') + 1);
          base64Audio = `data:${cleanMime};base64,${b64Data}`;
        }
        const msgIndex = state.messages.findIndex(m => m.id === msgId);
        if (msgIndex !== -1) state.messages[msgIndex].base64 = base64Audio;

        if (boxType === 'recording_box_1') {
          const evalPrompt = `첨부된 오디오 파일을 듣고 학생의 영어 발음을 분석해줘.
학습 대상 단어: "${state.currentWord}", 발음기호: ${state.context.phonetics}
현재 시도: ${state.recordRetryCount + 1}/3회
[분석] 1. 발음 정확도 2. 강세 3. 억양
JSON: {"feedback": "친절한 피드백 1~2문장 ${state.recordRetryCount >= 2 ? '(3번째이므로 격려하며 다음 단계 유도)' : ''} (마크다운/이모지 금지)", "retry": ${state.recordRetryCount >= 2 ? 'false' : 'true/false'}}`;
          const evalRes = await callGemini(evalPrompt, true, base64Audio);
          addMessage({ role: 'ai', content: evalRes.feedback });

          if (!evalRes.retry || state.recordRetryCount >= 2) state.evaluation.pronunciationFeedback = evalRes.feedback;

          if (evalRes.retry && state.recordRetryCount < 2) {
            state.recordRetryCount++;
            setTimeout(() => { addMessage({ role: 'system', type: 'recording_box_1' }); state.chatStep = 'WAIT_RECORD_1'; setTyping(false); }, 1000);
          } else {
            state.recordRetryCount = 0;
            setTimeout(() => { addMessage({ role: 'system', type: 'tts_box' }); state.chatStep = 'WAIT_TTS'; setTyping(false); }, 1000);
          }
        } else if (boxType === 'recording_box_2') {
          const evalPrompt = `첨부된 오디오는 학생이 원어민 발음을 듣고 "${state.currentWord}"를 따라 읽은 파일이야. 가볍게 칭찬하고 격려하는 피드백 1문장 (마크다운/이모지 금지)`;
          const feedback = await callGemini(evalPrompt, false, base64Audio);
          addMessage({ role: 'ai', content: feedback });
          if (state.evaluation.pronunciationFeedback) state.evaluation.pronunciationFeedback += '\n\n' + feedback;
          else state.evaluation.pronunciationFeedback = feedback;
          setTimeout(() => { transitionToMeaning(); }, 1000);
        }
      } catch (err) {
        console.error('음성 분석 실패:', err);
        addMessage({ role: 'ai', content: '음성 분석에 실패했어. 다시 녹음해볼래?' });
        addMessage({ role: 'system', type: boxType });
        state.chatStep = boxType === 'recording_box_1' ? 'WAIT_RECORD_1' : 'WAIT_RECORD_2';
        setTyping(false);
      }
    }

    function transitionToRecord2() {
      state.chatStep = 'PROCESSING';
      addMessage({ role: 'ai', content: '방금 들은 원어민 발음처럼 한 번 더 자신 있게 녹음해볼까?' });
      setTimeout(() => { addMessage({ role: 'system', type: 'recording_box_2' }); state.chatStep = 'WAIT_RECORD_2'; }, 500);
    }

    async function transitionToMeaning() {
      state.chatStep = 'PROCESSING';
      setTyping(true);
      addMessage({ role: 'ai', content: `영영 뜻을 볼까?: \n"${state.context.engDef}"` });
      setTimeout(() => { addMessage({ role: 'ai', content: '자, 이 단어의 한글 뜻이 뭘까? 유추해서 적어봐.' }); state.chatStep = 'WAIT_MEANING'; state.inputEnabled = true; setTyping(false); updateInputState(); }, 1500);
    }

    function updateInputState() {
      const input = document.getElementById('chat-input');
      const submitBtn = document.querySelector('#chat-form button[type="submit"]');
      if (input) {
        input.disabled = !state.inputEnabled;
        input.placeholder = state.inputEnabled ? '답변을 입력하세요...' : '대화 진행 중...';
        input.className = `w-full pl-3 pr-10 py-2 sm:py-3 rounded-xl border ${state.inputEnabled ? 'bg-gray-50 border-gray-300 focus:border-blue-500' : 'bg-gray-100 border-gray-200 cursor-not-allowed'} outline-none transition-colors text-[15px]`;
        if (state.inputEnabled) input.focus();
      }
      if (submitBtn) submitBtn.disabled = !state.inputEnabled;
    }

    async function handleUserTextSubmit() {
      const inputEl = document.getElementById('chat-input');
      if (inputEl) state.inputText = inputEl.value;
      if (!state.inputText.trim()) return;
      const userText = state.inputText.trim();
      state.inputText = '';
      state.inputEnabled = false;
      if (inputEl) inputEl.value = '';
      addMessage({ role: 'user', content: userText });
      setTyping(true);
      updateInputState();

      try {
        if (state.chatStep === 'WAIT_MEANING') {
          const evalPrompt = `단어 "${state.currentWord}"의 뜻을 학생이 "${userText}"라고 대답. 가볍게 평가하고 실제 뜻들을 3~4문장으로 설명해줘. (마크다운/이모지 금지)`;
          const evalRes = await callGemini(evalPrompt);
          addMessage({ role: 'ai', content: evalRes });
          setTimeout(() => { addMessage({ role: 'ai', content: '문맥 속에서 어떻게 쓰이는지 예문을 보여줄게.' }); addMessage({ role: 'system', type: 'ex1_box' }); state.chatStep = 'WAIT_EX1_BTN'; setTyping(false); }, 1500);
        } else if (state.chatStep === 'WAIT_EX1_ANS') await handleExampleAnswer(userText, 1);
        else if (state.chatStep === 'WAIT_EX2_ANS') await handleExampleAnswer(userText, 2);
        else if (state.chatStep === 'WAIT_WRITING_ANS') await handleWritingAnswer(userText);
      } catch (err) {
        addMessage({ role: 'ai', content: '앗, 문제가 생겼어. 다시 한번 답변해줄래?' });
        state.inputEnabled = true;
        setTyping(false);
        updateInputState();
      }
    }

    async function handleExampleAnswer(userText, exNum) {
      const evalPrompt = `단어 "${state.currentWord}"가 쓰인 예문 "${state.context.tempEx}"에 대해 학생이 "${userText}"라고 번역. 시도: ${state.retryCount + 1}/3회 JSON: {"feedback": "평가 (마크다운 금지)", "retry": ${state.retryCount >= 2 ? 'false' : 'true/false'}}`;
      const evalRes = await callGemini(evalPrompt, true);
      addMessage({ role: 'ai', content: evalRes.feedback });
      if (evalRes.retry && state.retryCount < 2) { state.retryCount++; state.chatStep = exNum === 1 ? 'WAIT_EX1_ANS' : 'WAIT_EX2_ANS'; state.inputEnabled = true; setTyping(false); updateInputState(); }
      else { state.evaluation.exampleSentences.push({ text: state.context.tempEx, userTranslation: userText, feedback: evalRes.feedback }); state.retryCount = 0; setTimeout(() => { if (exNum === 1) transitionToEx2Btn(); else transitionToWriting(); setTyping(false); }, 1000); }
    }

    async function handleWritingAnswer(userText) {
      const evalPrompt = `한국어 "${state.context.tempEx}"를 학생이 영어로 "${userText}"라고 작문. 핵심단어: ${state.currentWord} 시도: ${state.retryCount + 1}/3회 JSON: {"feedback": "평가 (마크다운 금지)", "retry": ${state.retryCount >= 2 ? 'false' : 'true/false'}}`;
      const evalRes = await callGemini(evalPrompt, true);
      addMessage({ role: 'ai', content: evalRes.feedback });
      if (evalRes.retry && state.retryCount < 2) { state.retryCount++; state.chatStep = 'WAIT_WRITING_ANS'; state.inputEnabled = true; setTyping(false); updateInputState(); }
      else {
        state.evaluation.writing = { text: state.context.tempEx, userWriting: userText, feedback: evalRes.feedback };
        state.retryCount = 0;
        const sumPrompt = `단어 "${state.currentWord}" 단어장 카드 JSON: {"comment": "격려 1~2문장", "pos": "품사", "meanings": ["뜻"], "example": "예문"}`;
        const sumRes = await callGemini(sumPrompt, true);
        setTimeout(() => { addMessage({ role: 'ai', content: sumRes.comment }); state.context.finalData = { pos: sumRes.pos, meanings: sumRes.meanings, example: sumRes.example }; addMessage({ role: 'system', type: 'save_box' }); state.chatStep = 'WAIT_SAVE'; setTyping(false); }, 1500);
      }
    }

    async function triggerEx1() {
      state.chatStep = 'PROCESSING'; setTyping(true);
      try {
        const exPrompt = `단어 "${state.currentWord}"가 쓰인 쉬운 영어 예문 1개 JSON: {"en": "문장"}`;
        const data = await callGemini(exPrompt, true);
        state.context.tempEx = data.en;
        addMessage({ role: 'ai', content: `[예문 1]\n"${data.en}"\n\n이 문장을 해석해볼래?` });
        state.chatStep = 'WAIT_EX1_ANS'; state.inputEnabled = true; setTyping(false); updateInputState();
      } catch (err) { addMessage({ role: 'ai', content: '예문을 가져오는 데 문제가 생겼어.' }); addMessage({ role: 'system', type: 'ex1_box' }); state.chatStep = 'WAIT_EX1_BTN'; setTyping(false); }
    }

    function transitionToEx2Btn() { addMessage({ role: 'ai', content: '그럼 다음 예문을 볼까?' }); addMessage({ role: 'system', type: 'ex2_box' }); state.chatStep = 'WAIT_EX2_BTN'; }

    async function triggerEx2() {
      state.chatStep = 'PROCESSING'; setTyping(true);
      try {
        const exPrompt = `단어 "${state.currentWord}"가 쓰인 다른 맥락의 쉬운 영어 예문 1개 JSON: {"en": "문장"}`;
        const data = await callGemini(exPrompt, true);
        state.context.tempEx = data.en;
        addMessage({ role: 'ai', content: `[예문 2]\n"${data.en}"\n\n이 문장도 해석해봐.` });
        state.chatStep = 'WAIT_EX2_ANS'; state.inputEnabled = true; setTyping(false); updateInputState();
      } catch (err) { addMessage({ role: 'ai', content: '예문을 가져오는 데 문제가 생겼어.' }); addMessage({ role: 'system', type: 'ex2_box' }); state.chatStep = 'WAIT_EX2_BTN'; setTyping(false); }
    }

    async function transitionToWriting() {
      state.chatStep = 'PROCESSING'; setTyping(true);
      try {
        const writePrompt = `단어 "${state.currentWord}"의 뜻을 활용한 쉬운 한국어 문장 1개 (영어 알파벳 절대 금지). JSON: {"ko": "문장"}`;
        const data = await callGemini(writePrompt, true);
        state.context.tempEx = data.ko;
        addMessage({ role: 'ai', content: `마지막으로 영작을 해봐야 진짜 내 것이 되지!\n\n"${data.ko}"\n\n이 문장을 영어로 작문해볼래?` });
        state.chatStep = 'WAIT_WRITING_ANS'; state.inputEnabled = true; setTyping(false); updateInputState();
      } catch (err) {
        addMessage({ role: 'ai', content: '문제를 만드는 데 오류가 생겼어.' });
        try { const sumPrompt = `단어 "${state.currentWord}" 단어장 카드 JSON: {"comment": "격려", "pos": "품사", "meanings": ["뜻"], "example": "예문"}`; const sumRes = await callGemini(sumPrompt, true); state.context.finalData = sumRes; addMessage({ role: 'system', type: 'save_box' }); state.chatStep = 'WAIT_SAVE'; } catch (e) { goHome(); }
        setTyping(false);
      }
    }

    function saveWord() {
      const wordData = { word: state.currentWord, phonetics: state.context.phonetics, pos: state.context.finalData?.pos || '단어', meanings: state.context.finalData?.meanings || [state.context.engDef], example: state.context.finalData?.example };
      if (!state.vocabList.find(w => w.word === wordData.word)) { state.vocabList.unshift(wordData); saveVocabList(); showToast('단어장에 저장했어!'); }
      else showToast('이미 저장된 단어야!');
      goHome();
    }

    // =====================
    // 리포트
    // =====================
    function renderReportView(container) {
      container.innerHTML = `
        <div class="flex-1 overflow-y-auto bg-gray-100 flex flex-col p-4">
          <div class="flex items-center justify-between mb-4">
            <button id="report-back-btn" class="p-2 text-gray-600 bg-white rounded-full shadow-sm hover:bg-gray-50"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
            <div class="font-bold text-gray-800">학습 리포트</div>
            <div class="flex gap-2">
              <button id="report-pdf-btn" class="p-2 text-blue-600 bg-white rounded-full shadow-sm hover:bg-blue-50" title="PDF 다운로드"><i data-lucide="download" class="w-5 h-5"></i></button>
              <button id="report-save-btn" class="p-2 text-gray-800 bg-white rounded-full shadow-sm hover:bg-gray-50" title="단어 저장"><i data-lucide="bookmark-plus" class="w-5 h-5"></i></button>
            </div>
          </div>
          <div id="pdf-content" class="bg-white rounded-xl shadow-lg p-6 sm:p-8 text-gray-800 w-full max-w-2xl mx-auto">
            <div class="flex items-center gap-4 mb-6 border-b pb-4"><img src="${CONFIG.KIM_IMAGE_URL}" alt="김수석" class="w-16 h-16 rounded-full border border-gray-200" /><div><h2 class="text-xl font-bold text-gray-900">오늘의 단어: <span class="text-blue-600 text-2xl capitalize">${escapeHtml(state.currentWord)}</span></h2><div class="text-sm text-gray-500 font-mono mt-1">[${escapeHtml(state.context.phonetics || '')}]</div></div></div>
            <div class="mb-6"><h3 class="text-lg font-bold flex items-center gap-2 mb-2"><i data-lucide="book" class="w-5 h-5 text-blue-600"></i> 뜻과 정의</h3><div class="bg-gray-50 p-4 rounded-lg"><p class="font-bold text-gray-900 mb-1">${escapeHtml(state.context.finalData?.pos || '단어')}</p><ul class="list-disc pl-5 space-y-1 text-gray-700 text-[15px]">${(state.context.finalData?.meanings || [state.context.engDef]).map(m => `<li>${escapeHtml(m)}</li>`).join('')}</ul></div></div>
            <div class="mb-6"><h3 class="text-lg font-bold flex items-center gap-2 mb-2"><i data-lucide="mic" class="w-5 h-5 text-green-600"></i> 발음 평가</h3><div class="bg-green-50/50 p-4 rounded-lg text-[15px] whitespace-pre-wrap text-gray-700 border border-green-100">${escapeHtml(state.evaluation.pronunciationFeedback || '발음 녹음 기록이 없습니다.')}</div></div>
            <div class="mb-6"><h3 class="text-lg font-bold flex items-center gap-2 mb-2"><i data-lucide="message-circle" class="w-5 h-5 text-orange-500"></i> 예문 해석</h3><div class="space-y-4">${state.evaluation.exampleSentences.length > 0 ? state.evaluation.exampleSentences.map((ex, i) => `<div class="bg-orange-50/30 p-4 rounded-lg border border-orange-100 text-[14px]"><p class="font-bold text-gray-900 mb-2">[예문 ${i + 1}] ${escapeHtml(ex.text)}</p><div class="bg-white p-3 rounded border border-gray-200 mb-2"><span class="text-xs font-bold text-gray-500 block">나의 해석</span><p class="text-gray-800">${escapeHtml(ex.userTranslation)}</p></div><p class="text-sm text-gray-700">${escapeHtml(ex.feedback)}</p></div>`).join('') : '<p class="text-gray-500 text-sm italic">기록 없음</p>'}</div></div>
            <div class="mb-6"><h3 class="text-lg font-bold flex items-center gap-2 mb-2"><i data-lucide="pen-tool" class="w-5 h-5 text-purple-600"></i> 영작 연습</h3><div class="bg-purple-50/30 p-4 rounded-lg border border-purple-100 text-[14px]">${state.evaluation.writing.text ? `<p class="font-bold text-gray-900 mb-2">${escapeHtml(state.evaluation.writing.text)}</p><div class="bg-white p-3 rounded border border-gray-200 mb-2"><span class="text-xs font-bold text-gray-500 block">나의 영작</span><p class="text-gray-800 font-mono">${escapeHtml(state.evaluation.writing.userWriting)}</p></div><p class="text-sm text-gray-700">${escapeHtml(state.evaluation.writing.feedback)}</p>` : '<p class="text-gray-500 text-sm italic">기록 없음</p>'}</div></div>
            <div class="text-center text-sm text-gray-400 mt-8 border-t pt-4">Generated by 김수석 영어 사전</div>
          </div>
        </div>`;
      lucide.createIcons();
      document.getElementById('report-back-btn').onclick = () => { state.view = 'chat'; render(); scrollToBottom(); };
      document.getElementById('report-save-btn').onclick = () => { saveWord(); };
      document.getElementById('report-pdf-btn').onclick = downloadPdf;
    }

    function downloadPdf() {
      const element = document.getElementById('pdf-content');
      if (!element) return;
      showToast('PDF 생성 중...');
      if (typeof html2pdf === 'undefined') { showToast('PDF 라이브러리 로드 실패'); return; }
      html2pdf().set({ margin: 10, filename: `학습리포트_${state.currentWord}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(element).save().then(() => showToast('PDF 다운로드 완료!')).catch(err => { console.error('PDF 생성 오류:', err); showToast('PDF 생성 실패'); });
    }

    // =====================
    // 초기화
    // =====================
    window.addEventListener('DOMContentLoaded', () => {
      const support = checkBrowserSupport();
      if (!support.localStorage) showToast('단어장 저장이 지원되지 않습니다.');
      if (!support.secureContext) console.warn('비보안 컨텍스트 - 녹음 기능 제한됨');
      if (support.speechSynthesis) loadTTSVoices();
      render();
    });

    window.addEventListener('beforeunload', () => {
      revokeAllBlobUrls();
      if (state.currentStream) state.currentStream.getTracks().forEach(track => track.stop());
    });
  </script>
</body>

</html>
